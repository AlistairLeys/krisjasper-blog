---
layout: default
---
<div class="post">
  <h2 class="date-header">{{ page.date | date: "%A, %d %B %Y" }}</h2>
  <h3 class="post-title entry-title">{{ page.title }}</h3>
  <div class="post-body">
    {{ content }}
  </div>
  <div class="post-footer">
    <span class="post-timestamp">{{ page.date | date: "%d %B %Y" }}</span>
  </div>
</div>
